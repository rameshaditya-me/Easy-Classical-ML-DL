<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Notebooks on Learning" />
    <title>Notebooks on Learning</title>
    <link rel="stylesheet" href="styles.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github.min.css"
      id="hljs-light"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github-dark.min.css"
      id="hljs-dark"
      media="none"
    />
    <script>
      (function () {
        const stored = localStorage.getItem("theme");
        const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        const dark = stored === "dark" || (!stored && prefersDark);
        if (dark) {
          document.documentElement.dataset.theme = "dark";
          document.getElementById("hljs-dark").media = "all";
          document.getElementById("hljs-light").media = "none";
        }
      })();
    </script>
  </head>
  <body>
    <header class="site-header">
      <a class="site-name" href="./">Notebooks on Learning</a>
      <nav class="site-nav">
        <button
          type="button"
          class="theme-toggle"
          id="theme-toggle"
          aria-label="Switch to dark mode"
          title="Toggle dark mode"
        >
          <svg class="icon icon-sun" viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
            <circle cx="12" cy="12" r="4" fill="currentColor" />
            <g stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <line x1="12" y1="2" x2="12" y2="5" />
              <line x1="12" y1="19" x2="12" y2="22" />
              <line x1="2" y1="12" x2="5" y2="12" />
              <line x1="19" y1="12" x2="22" y2="12" />
              <line x1="4.22" y1="4.22" x2="6.34" y2="6.34" />
              <line x1="17.66" y1="17.66" x2="19.78" y2="19.78" />
              <line x1="4.22" y1="19.78" x2="6.34" y2="17.66" />
              <line x1="17.66" y1="6.34" x2="19.78" y2="4.22" />
            </g>
          </svg>
          <svg class="icon icon-moon" viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
            <path
              fill="currentColor"
              d="M21 14.5A8.5 8.5 0 1 1 9.5 3a6.5 6.5 0 1 0 11.5 11.5z"
            />
          </svg>
        </button>
        <a href="https://github.com/rameshaditya-me/Easy-Classical-ML-DL" target="_blank" rel="noopener noreferrer">GitHub</a>
      </nav>
    </header>

    <main class="content article" id="content" aria-live="polite">
      <p class="content-loading">Loading…</p>
    </main>

    <footer class="site-footer">
      <p>
        <a href="./">← Back to index</a>
        ·
        <a href="https://github.com/rameshaditya-me/Easy-Classical-ML-DL" target="_blank" rel="noopener noreferrer">Source on GitHub</a>
      </p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/highlight.min.js" crossorigin="anonymous"></script>
    <script src="site.js"></script>
    <script>
      Site.configureMarked();
      Site.initTheme();
      Site.bootPage();
    </script>
  </body>
</html>
